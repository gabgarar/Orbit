<!doctype html>
<html lang="es">
<link rel="icon" type="image/gif" href="assets/favicon.gif">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orbit - Cesium Globe</title>
  <link href="https://unpkg.com/cesium@1.124/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { height:100%; margin:0; padding:0; overflow:hidden; }
    #toolbar { position:absolute; top:8px; left:8px; z-index:1; background:rgba(255,255,255,0.9); padding:6px; border-radius:4px; }
    #wsUrl { margin-left:6px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="toolbar">
    <button id="connectBtn">Conectar WebSocket</button>
    <input id="wsUrl" value="ws://localhost:8765" style="width:240px" />
  </div>

  <script src="https://unpkg.com/cesium@1.124/Build/Cesium/Cesium.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
